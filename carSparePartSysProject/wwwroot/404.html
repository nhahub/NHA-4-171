<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found — AutoParts</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>
    <main class="main-content">
      <div class="error-page">
        <div class="error-page__icon" id="error-icon"></div>
        <div class="error-page__code">404</div>
        <h1 class="error-page__title">Page Not Found</h1>
        <p class="error-page__message">
          The page you're looking for doesn't exist or has been moved. Maybe the part you need is just a search away!
        </p>
        <div style="display:flex;gap:var(--space-3)">
          <a href="/index.html" class="btn btn--primary btn--lg">Back to Home</a>
          <a href="/products.html" class="btn btn--outline btn--lg">Browse Products</a>
        </div>
      </div>
    </main>
    <div id="footer-placeholder"></div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/pages/common.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const icon = document.getElementById('error-icon');
      if (icon) icon.innerHTML = UI.Icons.wrench;
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard — AutoParts</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
</head>
<body class="admin-body">
  <div class="admin-layout">
    <!-- Sidebar Placeholder -->
    <aside id="admin-sidebar" class="admin-sidebar"></aside>

    <!-- Main Content -->
    <main class="admin-main">
      <div class="admin-header">
        <h1 class="admin-header__title">Overview Dashboard</h1>
        <div class="admin-header__actions">
          <button class="btn btn--outline btn--sm" onclick="location.reload()">
            Refresh Data
          </button>
        </div>
      </div>

      <!-- KPI Cards Grid -->
      <div class="kpi-grid">
        <!-- KPI 1 -->
        <div class="kpi-card">
          <div class="kpi-card__label">Total Revenue</div>
          <div class="kpi-card__value" id="kpi-revenue">$0.00</div>
          <div class="kpi-card__footer">
            <span class="kpi-card__trend kpi-card__trend--up">▲ 12%</span>
            <span style="color:var(--text-muted)">vs last month</span>
          </div>
          <div class="kpi-card__icon" id="kpi-icon-rev"></div>
        </div>
        <!-- KPI 2 -->
        <div class="kpi-card">
          <div class="kpi-card__label">Total Orders</div>
          <div class="kpi-card__value" id="kpi-orders">0</div>
          <div class="kpi-card__footer">
            <span class="kpi-card__trend kpi-card__trend--up">▲ 8%</span>
            <span style="color:var(--text-muted)">vs last month</span>
          </div>
          <div class="kpi-card__icon" id="kpi-icon-ord"></div>
        </div>
        <!-- KPI 3 -->
        <div class="kpi-card">
          <div class="kpi-card__label">Low Stock Items</div>
          <div class="kpi-card__value" id="kpi-lowstock">0</div>
          <div class="kpi-card__footer">
            <span class="kpi-card__trend kpi-card__trend--down" id="kpi-lowstock-trend">▼ 2%</span>
            <span style="color:var(--text-muted)">reorder required</span>
          </div>
          <div class="kpi-card__icon" id="kpi-icon-stock"></div>
        </div>
        <!-- KPI 4 -->

      </div>

      <!-- Charts Section -->
      <div class="chart-container">
        <h3 class="chart-container__title">Revenue History (Last 6 Months)</h3>
        <div class="admin-chart">
          <svg class="chart-svg" viewBox="0 0 800 240" preserveAspectRatio="none">
            <!-- Grid Lines -->
            <line class="chart-grid-line" x1="0" y1="40" x2="800" y2="40"></line>
            <line class="chart-grid-line" x1="0" y1="100" x2="800" y2="100"></line>
            <line class="chart-grid-line" x1="0" y1="160" x2="800" y2="160"></line>
            <line class="chart-grid-line" x1="0" y1="220" x2="800" y2="220"></line>
            
            <!-- Connection Line Path -->
            <path class="chart-line" d="M 50 180 L 190 140 L 330 190 L 470 100 L 610 80 L 750 40"></path>

            <!-- Line Points -->
            <circle class="chart-point" cx="50" cy="180" r="5"></circle>
            <circle class="chart-point" cx="190" cy="140" r="5"></circle>
            <circle class="chart-point" cx="330" cy="190" r="5"></circle>
            <circle class="chart-point" cx="470" cy="100" r="5"></circle>
            <circle class="chart-point" cx="610" cy="80" r="5"></circle>
            <circle class="chart-point" cx="750" cy="40" r="5"></circle>

            <!-- Text Labels -->
            <text class="chart-label" x="50" y="238">Jan</text>
            <text class="chart-label" x="190" y="238">Feb</text>
            <text class="chart-label" x="330" y="238">Mar</text>
            <text class="chart-label" x="470" y="238">Apr</text>
            <text class="chart-label" x="610" y="238">May</text>
            <text class="chart-label" x="750" y="238">Jun</text>
          </svg>
        </div>
      </div>

      <!-- Recent Orders Table -->
      <div class="card">
        <h3 class="card__title" style="margin-bottom:var(--space-4)">Recent Orders</h3>
        <div class="table-responsive">
          <table class="data-table data-table--dense">
            <thead>
              <tr>
                <th>Order Number</th>
                <th>Customer</th>
                <th>Order Date</th>
                <th>Total Amount</th>
                <th>Payment</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="recent-orders-list">
              <!-- Rendered Dynamically -->
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/admin-api.js"></script>
  <script src="/js/admin/admin-common.js"></script>
  <script src="/js/admin/dashboard.js"></script>
</body>
</html>

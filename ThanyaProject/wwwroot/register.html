<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Create your AutoParts account to start shopping." />
  <title>Register — AutoParts</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
</head>
<body>
  <div class="page-wrapper">
    <div id="navbar-placeholder"></div>
    <main class="main-content">
      <div class="auth-page">
        <div class="auth-card">
          <div class="auth-card__logo" id="auth-logo"></div>
          <h1 class="auth-card__title">Create Account</h1>
          <p class="auth-card__subtitle">Join thousands of car enthusiasts</p>

          <form class="auth-card__form" id="register-form">
            <div class="form-row">
              <div class="form-group">
                <label class="form-label form-label--required" for="reg-firstname">First Name</label>
                <input type="text" class="form-input" id="reg-firstname" name="firstName" placeholder="John" required />
              </div>
              <div class="form-group">
                <label class="form-label form-label--required" for="reg-lastname">Last Name</label>
                <input type="text" class="form-input" id="reg-lastname" name="lastName" placeholder="Doe" required />
              </div>
            </div>
            <div class="form-group">
              <label class="form-label form-label--required" for="reg-username">Username</label>
              <input type="text" class="form-input" id="reg-username" name="username" placeholder="johndoe" required autocomplete="username" />
            </div>
            <div class="form-group">
              <label class="form-label form-label--required" for="reg-email">Email</label>
              <input type="email" class="form-input" id="reg-email" name="email" placeholder="john@example.com" required autocomplete="email" />
            </div>
            <div class="form-group">
              <label class="form-label" for="reg-phone">Phone</label>
              <input type="tel" class="form-input" id="reg-phone" name="phone" placeholder="+1 234 567 890" />
            </div>
            <div class="form-group">
              <label class="form-label form-label--required" for="reg-password">Password</label>
              <input type="password" class="form-input" id="reg-password" name="password" placeholder="At least 6 characters" required autocomplete="new-password" minlength="6" />
            </div>
            <div class="form-group">
              <label class="form-label form-label--required" for="reg-confirm">Confirm Password</label>
              <input type="password" class="form-input" id="reg-confirm" name="confirmPassword" placeholder="Re-enter password" required autocomplete="new-password" />
            </div>
            <button type="submit" class="btn btn--primary btn--lg" id="register-btn" style="width:100%">
              Create Account
            </button>
          </form>

          <div class="auth-card__footer">
            Already have an account? <a href="/login.html">Sign in</a>
          </div>
        </div>
      </div>
    </main>
    <div id="footer-placeholder"></div>
  </div>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/pages/common.js"></script>
  <script src="/js/pages/register.js"></script>
</body>
</html>

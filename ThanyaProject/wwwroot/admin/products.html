<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Products — AutoParts Admin</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/admin.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
</head>
<body class="admin-body">
  <div class="admin-layout">
    <aside id="admin-sidebar" class="admin-sidebar"></aside>

    <main class="admin-main">
      <div class="admin-header">
        <h1 class="admin-header__title">Manage Products</h1>
        <div class="admin-header__actions">
          <button class="btn btn--primary btn--sm" onclick="openProductDrawer()">
            <span style="width:16px;height:16px" id="add-icon"></span>
            Add New Product
          </button>
        </div>
      </div>

      <!-- Filters & Search Toolbar -->
      <div class="card" style="margin-bottom:var(--space-5); padding:var(--space-4)">
        <div style="display:flex; gap:var(--space-4); align-items:center; flex-wrap:wrap">
          <div class="form-group" style="flex:1; min-width:200px">
            <input type="text" class="form-input" id="products-search-input" placeholder="Search by name, SKU or part #..." />
          </div>
          <div class="form-group" style="width:200px">
            <select class="form-select" id="filter-category-select">
              <option value="">All Categories</option>
            </select>
          </div>
          <div class="form-group" style="width:200px">
            <select class="form-select" id="filter-supplier-select">
              <option value="">All Suppliers</option>
            </select>
          </div>
          <button class="btn btn--secondary" onclick="resetFilters()">Reset</button>
        </div>
      </div>

      <!-- Data Table -->
      <div class="card" style="flex:1; display:flex; flex-direction:column">
        <div class="table-responsive" style="flex:1" id="products-table-container">
          <table class="data-table data-table--dense">
            <thead>
              <tr>
                <th>ID</th>
                <th>Thumbnail</th>
                <th>Product Name</th>
                <th>SKU</th>
                <th>Part Number</th>
                <th>Price</th>
                <th>Category</th>
                <th>Supplier</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="products-list">
              <!-- Rendered dynamically -->
            </tbody>
          </table>
        </div>

        <!-- Pagination -->
        <div class="pagination" id="products-pagination"></div>
      </div>
    </main>
  </div>

  <!-- Side-Panel Edit/Add Drawer -->
  <div class="drawer-backdrop" id="product-drawer-backdrop" onclick="closeProductDrawer(event)">
    <div class="drawer" id="product-drawer">
      <div class="drawer__header">
        <h3 class="drawer__title" id="drawer-title">Add Product</h3>
        <button class="drawer__close" onclick="closeProductDrawer()">${UI.Icons.close}</button>
      </div>

      <div class="drawer__body">
        <form id="product-edit-form" style="display:flex; flex-direction:column; gap:var(--space-4)">
          <input type="hidden" name="productId" id="product-id-input" />
          
          <div class="form-group">
            <label class="form-label form-label--required">Product Name</label>
            <input type="text" class="form-input" name="productName" id="product-name" required />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label form-label--required">SKU</label>
              <input type="text" class="form-input" name="sku" id="product-sku" required />
            </div>
            <div class="form-group">
              <label class="form-label">Part Number</label>
              <input type="text" class="form-input" name="partNumber" id="product-part-no" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea class="form-textarea" name="description" id="product-desc" rows="3"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label form-label--required">Unit Price ($)</label>
              <input type="number" class="form-input" name="unitPrice" id="product-price" step="0.01" min="0" required />
            </div>
            <div class="form-group">
              <label class="form-label">Cost Price ($)</label>
              <input type="number" class="form-input" name="costPrice" id="product-cost" step="0.01" min="0" />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label form-label--required">Category</label>
              <select class="form-select" name="categoryId" id="product-category" required>
                <!-- Loaded dynamically -->
              </select>
            </div>
            <div class="form-group">
              <label class="form-label form-label--required">Supplier</label>
              <select class="form-select" name="supplierId" id="product-supplier" required>
                <!-- Loaded dynamically -->
              </select>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Image URL</label>
            <input type="url" class="form-input" name="imageUrl" id="product-image-url" />
          </div>

          <div class="form-check">
            <input type="checkbox" name="isActive" id="product-active" checked />
            <label for="product-active">Active in storefront</label>
          </div>

          <!-- Nested Specifications Workspace -->
          <div style="border-top:1px solid var(--border); padding-top:var(--space-4)">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:var(--space-3)">
              <h4 style="font-size:var(--fs-sm)">Specifications</h4>
              <button type="button" class="btn btn--outline btn--sm" onclick="addSpecRow()">
                Add Spec Line
              </button>
            </div>
            <div style="display:flex; flex-direction:column; gap:var(--space-2)" id="specs-rows-container">
              <!-- Spec rows dynamically added here -->
            </div>
          </div>
        </form>
      </div>

      <div class="drawer__footer">
        <button class="btn btn--secondary" onclick="closeProductDrawer()">Cancel</button>
        <button class="btn btn--primary" id="save-product-btn" onclick="saveProduct()">Save Product</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/admin-api.js"></script>
  <script src="/js/admin/admin-common.js"></script>
  <script src="/js/admin/products.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — AutoParts</title>
  <link rel="stylesheet" href="/css/variables.css" />
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/css/pages.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
</head>
<body>
  <div class="page-wrapper">
    <main class="main-content" style="padding:0">
      <div class="auth-page" style="min-height:100vh">
        <div class="auth-card" style="border-top: 4px solid var(--warning)">
          <div class="auth-card__logo" id="admin-login-logo">
            <!-- Gear Icon Injected -->
          </div>
          <h1 class="auth-card__title">Admin Portal</h1>
          <p class="auth-card__subtitle" style="color:var(--warning)">Authorized personnel only</p>

          <form class="auth-card__form" id="admin-login-form">
            <div class="form-group">
              <label class="form-label form-label--required" for="admin-email">Email or Username</label>
              <input type="text" class="form-input" id="admin-email" name="email" placeholder="admin@CrSys.com" required autocomplete="username" />
            </div>
            <div class="form-group">
              <label class="form-label form-label--required" for="admin-password">Password</label>
              <input type="password" class="form-input" id="admin-password" name="password" placeholder="••••••••" required autocomplete="current-password" />
            </div>
            <button type="submit" class="btn btn--primary btn--lg" id="admin-login-btn" style="width:100%">
              Enter Dashboard
            </button>
          </form>

          <div class="auth-card__footer">
            <a href="/index.html" class="btn btn--ghost btn--sm">Return to Storefront</a>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/ui.js"></script>
  <script src="/js/admin/login.js"></script>
</body>
</html>
